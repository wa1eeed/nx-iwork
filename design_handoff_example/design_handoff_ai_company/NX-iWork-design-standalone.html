  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

x 12px;border-radius:8px;border:none;background:oklch(0.62 0.13 155);color:#fff;cursor:pointer\" onclick=\"{{ a.onApprove }}\">Approve<\u002Fbutton>\n                          <button style=\"font-size:11.5px;font-weight:600;padding:5px 12px;border-radius:8px;border:1px solid #e0d7c7;background:#fff;color:#4d463b;cursor:pointer\" onclick=\"{{ a.onDecline }}\">Send back<\u002Fbutton>\n                        <\u002Fdiv>\n                      <\u002Fsc-if>\n                      <sc-if value=\"{{ a.showChips }}\" hint-placeholder-val=\"{{ true }}\">\n                        <div style=\"display:flex;gap:5px;margin-top:2px;align-items:center\">\n                          <span style=\"{{ a.chipStyle }}\">⚡ {{ a.trigger }}<\u002Fspan>\n                          <span style=\"{{ a.modelChipStyle }}\"><span style=\"{{ a.modelDotStyle }}\"><\u002Fspan>{{ a.model }}<\u002Fspan>\n                        <\u002Fdiv>\n                      <\u002Fsc-if>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <sc-if value=\"{{ d.empty }}\"><button style=\"border:1px dashed #d8cfbd;border-radius:14px;padding:14px;display:flex;align-items:center;gap:10px;background:none;cursor:pointer;color:#8a8073;font-size:12.5px\" onclick=\"{{ d.onHire }}\"><span style=\"width:40px;height:40px;border-radius:50%;border:2px dashed #d8cfbd;display:flex;align-items:center;justify-content:center;font-size:18px\">＋<\u002Fspan>Hire your first {{ d.name }} agent<\u002Fbutton><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- right rail -->\n        <div class=\"scroll\" style=\"width:322px;flex:none;border-left:1px solid #e8e1d3;background:#fffdf9;padding:20px 18px;display:flex;flex-direction:column;gap:16px;overflow-y:auto\">\n          <div style=\"display:flex;align-items:center;gap:8px\">\n            <h3 style=\"margin:0;font-family:'Bricolage Grotesque';font-weight:700;font-size:16px\">Needs your attention<\u002Fh3>\n            <sc-if value=\"{{ hasApprovals }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-size:11px;font-weight:700;color:#fff;background:#c2593a;border-radius:999px;padding:2px 8px\">{{ approvalsCount }}<\u002Fspan><\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"font-size:11.5px;color:#9a9082;line-height:1.4;margin-top:-8px\">Agents route sensitive decisions to you via <b style=\"color:#6b6355\">request_approval<\u002Fb>.<\u002Fdiv>\n          <sc-for list=\"{{ approvals }}\" as=\"p\" hint-placeholder-count=\"3\">\n            <div style=\"border:1px solid #eee4d2;border-radius:13px;padding:13px;display:flex;flex-direction:column;gap:9px;background:#fff;animation:fadein .25s ease\">\n              <div style=\"display:flex;align-items:center;gap:9px\">\n                <div style=\"{{ p.avatarStyle }}\">{{ p.initials }}<\u002Fdiv>\n                <div style=\"line-height:1.15\"><div style=\"font-size:12.5px;font-weight:600\">{{ p.title }}<\u002Fdiv><div style=\"font-size:11px;color:#9a9082\">{{ p.sub }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ p.preview }}\"><div style=\"font-size:11.5px;color:#6b6355;background:#faf6ee;border:1px solid #eee4d2;border-radius:8px;padding:8px;line-height:1.4\">{{ p.preview }}<\u002Fdiv><\u002Fsc-if>\n              <div style=\"display:flex;gap:7px\">\n                <button style=\"flex:1;font-size:11.5px;font-weight:600;padding:6px;border-radius:8px;border:none;background:oklch(0.62 0.13 155);color:#fff;cursor:pointer\" onclick=\"{{ p.onApprove }}\">{{ p.primary }}<\u002Fbutton>\n                <button style=\"font-size:11.5px;font-weight:600;padding:6px 11px;border-radius:8px;border:1px solid #e0d7c7;background:#fff;cursor:pointer\" onclick=\"{{ p.onDecline }}\">{{ p.secondary }}<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ allClear }}\"><div style=\"border:1px dashed #d8cfbd;border-radius:13px;padding:20px;text-align:center;color:#9a9082;font-size:12.5px;line-height:1.5\">🌿 All caught up.<br>Your team is running on its own.<\u002Fdiv><\u002Fsc-if>\n\n          <div style=\"height:1px;background:#eee4d2\"><\u002Fdiv>\n          <div style=\"font-size:10.5px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:#a89d8c\">Live activity · timeline<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:12px;font-size:12px;color:#4d463b\">\n            <sc-for list=\"{{ activity }}\" as=\"ev\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;gap:9px;animation:fadein .3s ease\"><span style=\"color:#b3a894;width:30px;flex:none\">{{ ev.ago }}<\u002Fspan><span>{{ ev.text }}<\u002Fspan><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ AGENT WORKSPACE ============ -->\n    <sc-if value=\"{{ showAgent }}\">\n      <div class=\"scroll\" style=\"flex:1;min-width:0;overflow-y:auto;background:#f6f2ea\">\n        <div style=\"{{ agentBannerStyle }}\"><\u002Fdiv>\n        <div style=\"max-width:940px;margin:0 auto;padding:0 30px 40px\">\n          <button style=\"margin:18px 0 0;font-size:12.5px;color:#8a8073;border:none;background:none;cursor:pointer\" onclick=\"{{ goHome }}\">← Back to Command Center<\u002Fbutton>\n          <div style=\"display:flex;align-items:center;gap:16px;margin-top:16px\">\n            <div style=\"position:relative;flex:none\"><div style=\"{{ agent.bigAvatarStyle }}\">{{ agent.initials }}<\u002Fdiv><span style=\"{{ agent.bigDotStyle }}\"><\u002Fspan><\u002Fdiv>\n            <div style=\"flex:1\">\n              <div style=\"display:flex;align-items:center;gap:10px\"><span style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:26px;letter-spacing:-.01em\">{{ agent.name }}<\u002Fspan><span style=\"{{ agent.statusPillStyle }}\">{{ agent.statusLabel }}<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:13.5px;color:#8a8073\">{{ agent.role }} · {{ agent.dept }} · reports to {{ agent.reportsTo }}<\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"{{ agent.modelPillStyle }}\">{{ agent.model }} model<\u002Fspan>\n            <button style=\"font-size:12.5px;font-weight:600;padding:9px 15px;border-radius:10px;border:1px solid #e0d7c7;background:#fff;cursor:pointer\">Pause agent<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"{{ agent.personaStyle }}\">{{ agent.persona }}<\u002Fdiv>\n\n          <!-- tabs -->\n          <div style=\"display:flex;gap:4px;margin-top:22px;border-bottom:1px solid #e8e1d3\">\n            <button style=\"{{ agent.tabActivityStyle }}\" onclick=\"{{ agent.goActivity }}\">Activity<\u002Fbutton>\n            <button style=\"{{ agent.tabScenariosStyle }}\" onclick=\"{{ agent.goScenarios }}\">Scenarios<\u002Fbutton>\n            <button style=\"{{ agent.tabKpisStyle }}\" onclick=\"{{ agent.goKpis }}\">KPIs<\u002Fbutton>\n            <button style=\"{{ agent.tabMemoryStyle }}\" onclick=\"{{ agent.goMemory }}\">Memory<\u002Fbutton>\n            <button style=\"{{ agent.tabSettingsStyle }}\" onclick=\"{{ agent.goSettingsTab }}\">Settings<\u002Fbutton>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;grid-template-columns:1fr 300px;gap:22px;margin-top:20px;align-items:start\">\n            <!-- tab content -->\n            <div style=\"display:flex;flex-direction:column;gap:14px\">\n\n              <sc-if value=\"{{ agent.tabActivity }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#a89d8c\">Work log<\u002Fdiv>\n                <div style=\"background:#fffdf9;border:1px solid #e8e1d3;border-radius:14px;padding:6px 16px\">\n                  <sc-for list=\"{{ agent.log }}\" as=\"l\" hint-placeholder-count=\"4\">\n                    <div style=\"display:flex;gap:14px;padding:12px 0;border-bottom:1px solid #f0ebe0\">\n                      <span style=\"{{ l.dotStyle }}\"><\u002Fspan>\n                      <div style=\"flex:1\"><div style=\"font-size:13px;color:#3f382d\">{{ l.text }}<\u002Fdiv><div style=\"font-size:11px;color:#b3a894;margin-top:2px\">{{ l.time }}<\u002Fdiv><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#a89d8c;margin-top:6px\">Direct {{ agent.first }} · internal mode<\u002Fdiv>\n                <div style=\"background:#fffdf9;border:1px solid #e8e1d3;border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:10px\">\n                  <div style=\"display:flex;flex-direction:column;gap:9px;min-height:40px\">\n                    <sc-for list=\"{{ agent.chat }}\" as=\"m\" hint-placeholder-count=\"0\">\n                      <div style=\"{{ m.rowStyle }}\"><div style=\"{{ m.bubbleStyle }}\">{{ m.text }}<\u002Fdiv><\u002Fdiv>\n                    <\u002Fsc-for>\n                    <sc-if value=\"{{ agent.chatEmpty }}\"><div style=\"font-size:12.5px;color:#b3a894;text-align:center;padding:8px\">Give {{ agent.first }} a directive — they act via their tools and report back.<\u002Fdiv><\u002Fsc-if>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;gap:8px\">\n                    <input value=\"{{ chatInput }}\" oninput=\"{{ onChatInput }}\" onkeydown=\"{{ onChatKey }}\" placeholder=\"Message {{ agent.first }}…\" style=\"flex:1;font-size:13px;padding:10px 12px;border-radius:9px;border:1px solid #e0d7c7;background:#fff;outline:none\">\n                    <button style=\"font-size:13px;font-weight:600;padding:10px 16px;border-radius:9px;border:none;background:#211d17;color:#f6f2ea;cursor:pointer\" onclick=\"{{ sendChat }}\">Send<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ agent.tabScenarios }}\">\n                <div style=\"font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#a89d8c\">If-then scenarios → wake triggers<\u002Fdiv>\n                <sc-for list=\"{{ agent.scenarioRows }}\" as=\"s\" hint-placeholder-count=\"2\">\n                  <div style=\"background:#fffdf9;border:1px solid #e8e1d3;border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px\">\n                    <span style=\"{{ agent.trigIconStyle }}\">⚡<\u002Fspan>\n                    <div style=\"flex:1;font-size:13px\"><span style=\"color:#9a9082\">When <\u002Fspan><b>{{ s.when }}<\u002Fb><span style=\"color:#9a9082\"> → <\u002Fspan>{{ s.then }}<\u002Fdiv>\n                    <span style=\"font-size:10px;padding:3px 8px;border-radius:6px;background:#f0ebe0;color:#8a8073\">{{ s.kind }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <button style=\"border:1px dashed #d8cfbd;border-radius:12px;padding:12px;color:#8a8073;font-size:12.5px;background:none;cursor:pointer\">＋ Add scenario<\u002Fbutton>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ agent.tabKpis }}\">\n                <div style=\"font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#a89d8c\">KPIs &amp; performance<\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px\">\n                  <sc-for list=\"{{ agent.kpis }}\" as=\"k\" hint-placeholder-count=\"3\">\n                    <div style=\"background:#fffdf9;border:1px solid #e8e1d3;border-radius:14px;padding:15px\">\n                      <div style=\"font-size:11.5px;color:#9a9082\">{{ k.label }}<\u002Fdiv>\n                      <div style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:24px;margin-top:4px\">{{ k.value }}<\u002Fdiv>\n                      <div style=\"{{ k.trendStyle }}\">{{ k.trend }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"background:#fffdf9;border:1px solid #e8e1d3;border-radius:14px;padding:15px;display:flex;align-items:center;gap:14px;margin-top:2px\">\n                  <div style=\"flex:1\"><div style=\"font-size:13px;font-weight:600\">Tasks completed<\u002Fdiv><div style=\"font-size:11.5px;color:#9a9082\">Since {{ agent.first }} was hired<\u002Fdiv><\u002Fdiv>\n                  <div style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:22px\">{{ agent.tasksCompleted }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ agent.tabMemory }}\">\n                <div style=\"font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#a89d8c\">3-layer memory<\u002Fdiv>\n                <div style=\"background:#fffdf9;border:1px solid #e8e1d3;border-radius:14px;padding:15px;display:flex;gap:13px;align-items:flex-start\">\n                  <span style=\"font-size:18px\">🧠<\u002Fspan><div style=\"flex:1\"><div style=\"font-size:13.5px;font-weight:600\">Working memory<\u002Fdiv><div style=\"font-size:12px;color:#6b6355;line-height:1.5;margin-top:3px\">Last {{ agent.mem.working }} messages held in context this session (~5K tokens).<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"background:#fffdf9;border:1px solid #e8e1d3;border-radius:14px;padding:15px;display:flex;gap:13px;align-items:flex-start\">\n                  <span style=\"font-size:18px\">🗂️<\u002Fspan><div style=\"flex:1\"><div style=\"font-size:13.5px;font-weight:600\">Episodic memory<\u002Fdiv><div style=\"font-size:12px;color:#6b6355;line-height:1.5;margin-top:3px\">{{ agent.mem.episodic }} past tasks &amp; conversations stored in Postgres.<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"background:#fffdf9;border:1px solid #e8e1d3;border-radius:14px;padding:15px;display:flex;gap:13px;align-items:flex-start\">\n                  <span style=\"font-size:18px\">🔮<\u002Fspan><div style=\"flex:1\"><div style=\"font-size:13.5px;font-weight:600\">Semantic memory<\u002Fdiv><div style=\"font-size:12px;color:#6b6355;line-height:1.5;margin-top:3px\">{{ agent.mem.semantic }} long-term memories as 1536-dim vectors (pgvector). Nightly summary consolidates the day.<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ agent.tabSettings }}\">\n                <div style=\"font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#a89d8c\">Job description — governs this agent<\u002Fdiv>\n                <div style=\"background:#fffdf9;border:1px solid #e8e1d3;border-radius:14px;padding:15px;font-size:13px;line-height:1.55;color:#3f382d\">{{ agent.job }}<\u002Fdiv>\n                <div style=\"font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#a89d8c;margin-top:6px\">Tool permissions — function-calling allow-list<\u002Fdiv>\n                <div style=\"background:#fffdf9;border:1px solid #e8e1d3;border-radius:14px;padding:15px;display:flex;flex-wrap:wrap;gap:7px\">\n                  <sc-for list=\"{{ agent.permChips }}\" as=\"c\" hint-placeholder-count=\"4\">\n                    <span style=\"font-size:11.5px;font-family:'Instrument Sans';padding:6px 10px;border-radius:8px;background:#f0ebe0;color:#4d463b\">{{ c }}<\u002Fspan>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#a89d8c;margin-top:6px\">Autonomy — what {{ agent.first }} can do alone<\u002Fdiv>\n                <div style=\"background:#fffdf9;border:1px solid #e8e1d3;border-radius:14px;padding:15px;display:flex;flex-direction:column;gap:10px\">\n                  <div style=\"display:flex;gap:5px;background:#efe9dd;border-radius:10px;padding:4px\">\n                    <button style=\"{{ agent.autoSuggestStyle }}\" onclick=\"{{ agent.setSuggest }}\">Suggest<\u002Fbutton>\n                    <button style=\"{{ agent.autoAskStyle }}\" onclick=\"{{ agent.setAsk }}\">Ask<\u002Fbutton>\n                    <button style=\"{{ agent.autoAutoStyle }}\" onclick=\"{{ agent.setAuto }}\">Autopilot<\u002Fbutton>\n                  <\u002Fdiv>\n                  <div style=\"font-size:11.5px;color:#9a9082;line-height:1.4\">{{ agent.autoDesc }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n            <!-- right: quick facts (always) -->\n            <div style=\"display:flex;flex-direction:column;gap:14px\">\n              <div style=\"background:#fffdf9;border:1px solid #e8e1d3;border-radius:14px;padding:15px;display:flex;flex-direction:column;gap:12px\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between\"><span style=\"font-size:12px;color:#9a9082\">Status<\u002Fspan><span style=\"{{ agent.statusPillStyle }}\">{{ agent.statusLabel }}<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;align-items:center;justify-content:space-between\"><span style=\"font-size:12px;color:#9a9082\">Model tier<\u002Fspan><span style=\"font-size:12.5px;font-weight:600\">{{ agent.model }}<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;align-items:center;justify-content:space-between\"><span style=\"font-size:12px;color:#9a9082\">Reports to<\u002Fspan><span style=\"font-size:12.5px;font-weight:600\">{{ agent.reportsTo }}<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;align-items:center;justify-content:space-between\"><span style=\"font-size:12px;color:#9a9082\">Department<\u002Fspan><span style=\"font-size:12.5px;font-weight:600\">{{ agent.dept }}<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#fffdf9;border:1px solid #e8e1d3;border-radius:14px;padding:15px;display:flex;flex-direction:column;gap:8px\">\n                <div style=\"font-size:12px;color:#9a9082\">Tokens this month<\u002Fdiv>\n                <div style=\"display:flex;align-items:baseline;gap:6px\"><span style=\"font-family:'Bricolage Grotesque';font-weight:700;font-size:18px\">{{ agent.tokUsed }}<\u002Fspan><span style=\"font-size:11.5px;color:#9a9082\">of {{ agent.tokCap }} cap<\u002Fspan><\u002Fdiv>\n                <div style=\"height:6px;border-radius:3px;background:#efe9dd;overflow:hidden\"><div style=\"{{ agent.tokBarStyle }}\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"font-size:11px;color:#b3a894\">Per-agent cap protects the shared token bank.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ APPROVALS ============ -->\n    <sc-if value=\"{{ showApprovals }}\">\n      <div class=\"scroll\" style=\"flex:1;min-width:0;overflow-y:auto;padding:26px 30px\">\n        <div style=\"max-width:640px;margin:0 auto\">\n          <h2 style=\"margin:0 0 4px;font-family:'Bricolage Grotesque';font-weight:700;font-size:24px;letter-spacing:-.01em\">Approvals<\u002Fh2>\n          <p style=\"margin:0 0 22px;font-size:13px;color:#9a9082\">Sensitive decisions your agents paused for. Approving wakes them to continue.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:14px\">\n            <sc-for list=\"{{ approvals }}\" as=\"p\" hint-placeholder-count=\"3\">\n              <div style=\"border:1px solid #eee4d2;border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:11px;background:#fffdf9;animation:fadein .25s ease\">\n                <div style=\"display:flex;align-items:center;gap:11px\">\n                  <div style=\"{{ p.bigAvatarStyle }}\">{{ p.initials }}<\u002Fdiv>\n                  <div style=\"flex:1\">< e=\"display:flex;gap:5px;background:#efe9dd;border-radius:10px;padding:4px\">\n                    <button style=\"{{ hireFastStyle }}\" onclick=\"{{ setModelFast }}\">Fast<\u002Fbutton>\n                    <button style=\"{{ hireBalStyle }}\" onclick=\"{{ setModelBal }}\">Balanced<\u002Fbutton>\n                    <button style=\"{{ hireAdvStyle }}\" onclick=\"{{ setModelAdv }}\">Advanced<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"display:flex;flex-direction:column;gap:6px\">\n                <label style=\"font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#a89d8c\">Job description — governs the agent<\u002Flabel>\n                <textarea value=\"{{ hire.desc }}\" oninput=\"{{ onHireDesc }}\" placeholder=\"What does this employee own?\" style=\"font-size:13px;line-height:1.55;padding:11px 12px;border-radius:10px;border:1px solid #e0d7c7;background:#fff;outline:none;resize:vertical;min-height:88px\"><\u002Ftextarea>\n              <\u002Fdiv>\n\n              <div style=\"display:flex;flex-direction:column;gap:8px\">\n                <label style=\"font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#a89d8c\">Tool permissions — allow-list<\u002Flabel>\n                <div style=\"display:flex;flex-wrap:wrap;gap:7px\">\n                  <sc-for list=\"{{ hireTools }}\" as=\"t\" hint-placeholder-count=\"6\">\n                    <button style=\"{{ t.style }}\" onclick=\"{{ t.onToggle }}\">{{ t.check }} {{ t.name }}<\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"display:flex;flex-direction:column;gap:8px\">\n                <label style=\"font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#a89d8c\">If-then scenarios → wake triggers<\u002Flabel>\n                <sc-for list=\"{{ hireScenarioRows }
